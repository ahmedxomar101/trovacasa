name: Apartment Pipeline

on:
  schedule:
    # Twice daily: 9 and 19 CET (= UTC+1 winter, UTC+2 summer)
    - cron: "0 7,17 * * *"
  workflow_dispatch:
    inputs:
      city:
        description: "City to scrape (or all)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - lecco
          - varese
      source:
        description: "Source to scrape (idealista, immobiliare, or both)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - idealista
          - immobiliare

env:
  APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

jobs:
  scrape:
    name: "${{ matrix.city }} — ${{ matrix.source }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        city: [lecco, varese]
        source: [idealista, immobiliare]
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Check if this combination should run
        env:
          INPUT_CITY: ${{ github.event.inputs.city || 'all' }}
          INPUT_SOURCE: ${{ github.event.inputs.source || '' }}
          MATRIX_CITY: ${{ matrix.city }}
          MATRIX_SOURCE: ${{ matrix.source }}
        run: |
          if [ "$INPUT_CITY" != "all" ] && [ "$INPUT_CITY" != "$MATRIX_CITY" ]; then
            echo "Skipping $MATRIX_CITY (requested $INPUT_CITY only)"
            echo "SKIP=true" >> "$GITHUB_ENV"
          elif [ -n "$INPUT_SOURCE" ] && [ "$INPUT_SOURCE" != "$MATRIX_SOURCE" ]; then
            echo "Skipping $MATRIX_SOURCE (requested $INPUT_SOURCE only)"
            echo "SKIP=true" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP != 'true'

      - uses: astral-sh/setup-uv@v5
        if: env.SKIP != 'true'
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        if: env.SKIP != 'true'
        with:
          python-version: "3.13"

      - name: Install dependencies
        if: env.SKIP != 'true'
        working-directory: pipeline
        run: uv sync

      - name: Write config from secret
        if: env.SKIP != 'true'
        env:
          CONFIG_LECCO: ${{ secrets.CONFIG_LECCO }}
          CONFIG_VARESE: ${{ secrets.CONFIG_VARESE }}
          MATRIX_CITY: ${{ matrix.city }}
        run: |
          case "$MATRIX_CITY" in
            lecco)  echo "$CONFIG_LECCO" > config.yaml ;;
            varese) echo "$CONFIG_VARESE" > config.yaml ;;
          esac

      - name: Run pipeline
        if: env.SKIP != 'true'
        working-directory: pipeline
        env:
          SOURCE: ${{ matrix.source }}
        run: uv run python -m src.main all --source="$SOURCE" --skip-notify

      - name: Upload logs
        if: always() && env.SKIP != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.city }}-${{ matrix.source }}-logs-${{ github.run_id }}
          path: pipeline/logs/
          retention-days: 7

  notify:
    name: Send notifications
    runs-on: ubuntu-latest
    needs: [scrape]
    if: always() && needs.scrape.result != 'failure'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: pipeline
        run: uv sync

      - name: Write config from secret
        env:
          CONFIG_LECCO: ${{ secrets.CONFIG_LECCO }}
        run: echo "$CONFIG_LECCO" > config.yaml

      - name: Send Telegram notifications
        working-directory: pipeline
        run: uv run python -m src.main notify
